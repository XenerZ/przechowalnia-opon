<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resetowanie hasła — Przechowalnia Opon</title>
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
  <link rel="manifest" href="assets/favicon/site.webmanifest">
  <link rel="stylesheet" href="css/app.css?v=3">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="auth-brand-icon">PO</div>
      <div>
        <h1 class="auth-title">Przechowalnia Opon</h1>
        <p class="auth-subtitle">Resetowanie hasła</p>
      </div>
    </div>

    <div id="viewLoading" style="text-align:center;padding:1rem;color:var(--text-muted);font-size:.9rem">
      Weryfikacja linku…
    </div>

    <div id="viewInvalid" style="display:none">
      <div class="alert alert-error" style="margin-bottom:1rem">Link jest nieważny lub wygasł.</div>
      <a href="login.html" class="btn btn-primary btn-block">Wróć do logowania</a>
    </div>

    <form id="viewForm" style="display:none" onsubmit="submitReset(event)">
      <div class="form-group">
        <label>Nowe hasło *</label>
        <input type="password" id="newPass" placeholder="min. 6 znaków" autocomplete="new-password">
        <span class="form-error" id="newPassErr" style="display:none"></span>
      </div>
      <div class="form-group">
        <label>Powtórz nowe hasło *</label>
        <input type="password" id="newPass2" placeholder="••••••••" autocomplete="new-password">
        <span class="form-error" id="newPass2Err" style="display:none"></span>
      </div>
      <div id="resetAlert"></div>
      <button type="submit" class="btn btn-primary btn-block" id="resetBtn" style="margin-top:.5rem">Ustaw nowe hasło</button>
      <div style="text-align:center;margin-top:.75rem">
        <a href="login.html" class="btn-link">Wróć do logowania</a>
      </div>
    </form>

    <div id="viewSuccess" style="display:none;text-align:center">
      <div class="alert alert-success" style="margin-bottom:1.25rem">Hasło zostało zmienione. Możesz się teraz zalogować.</div>
      <a href="login.html" class="btn btn-primary btn-block">Przejdź do logowania</a>
    </div>
  </div>
</div>
<script src="js/api.js?v=2"></script>
<script>
(function(){ var t=localStorage.getItem('po_theme')||'light'; document.documentElement.setAttribute('data-theme',t); })();

var token = new URLSearchParams(window.location.search).get('token');

function show(id) {
  ['viewLoading','viewInvalid','viewForm','viewSuccess'].forEach(function(v){
    document.getElementById(v).style.display = v === id ? '' : 'none';
  });
}

// Weryfikacja tokenu — próbujemy wywołać reset z pustym hasłem; 400 = token OK, inne = błąd
(async function init() {
  if (!token) { show('viewInvalid'); return; }
  // Sprawdzamy token wysyłając nieprawidłowe żądanie — jeśli serwer zwróci 400 "Brakuje pól"
  // to token jest OK; jeśli zwróci "nieważny lub wygasł" — pokazujemy błąd
  try {
    await API.post('/auth/reset-password', { token: token, newPassword: '' });
  } catch(e) {
    if (e.message && e.message.includes('minimum 6')) {
      // Token istnieje, formularz walidacyjny zwrócił błąd hasła — token jest OK
      show('viewForm');
      setTimeout(function(){ document.getElementById('newPass').focus(); }, 50);
      return;
    }
  }
  // Pusty token, brak odpowiedzi lub "nieważny" — pokaż błąd
  show('viewInvalid');
})();

async function submitReset(e) {
  e.preventDefault();
  document.getElementById('newPassErr').style.display  = 'none';
  document.getElementById('newPass2Err').style.display = 'none';
  document.getElementById('resetAlert').innerHTML = '';

  var np  = document.getElementById('newPass').value;
  var np2 = document.getElementById('newPass2').value;
  var ok  = true;

  if (!np)             { showErr('newPassErr',  'Pole wymagane'); ok = false; }
  else if (np.length < 6) { showErr('newPassErr', 'Minimum 6 znaków'); ok = false; }
  if (!np2)            { showErr('newPass2Err', 'Pole wymagane'); ok = false; }
  else if (np !== np2) { showErr('newPass2Err', 'Hasła nie są identyczne'); ok = false; }
  if (!ok) return;

  var btn = document.getElementById('resetBtn');
  btn.disabled = true; btn.textContent = 'Zapisywanie…';
  try {
    await API.post('/auth/reset-password', { token: token, newPassword: np });
    show('viewSuccess');
  } catch(ex) {
    document.getElementById('resetAlert').innerHTML =
      '<div class="alert alert-error" style="margin:.5rem 0">' + ex.message + '</div>';
    btn.disabled = false; btn.textContent = 'Ustaw nowe hasło';
  }
}

function showErr(id, msg) {
  var el = document.getElementById(id); el.textContent = msg; el.style.display = 'block';
}
</script>
</body>
</html>
