<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klienci — Przechowalnia Opon</title>
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
  <link rel="manifest" href="assets/favicon/site.webmanifest"><link rel="stylesheet" href="css/app.css?v=2">
</head>
<body>
<div class="app-layout">
  <div id="navbar-container"></div>
  <main class="app-main">
    <div class="page">
      <div class="page-header">
        <div>
          <h1 class="page-title">Klienci</h1>
          <p class="page-subtitle" id="subtitle">Ładowanie…</p>
        </div>
      </div>
      <div class="toolbar">
        <input type="text" class="search-input" id="search" placeholder="Szukaj klienta (imię, telefon, e-mail…)" oninput="render()">
      </div>
      <div id="list" class="customers-list">
        <div style="padding:2rem;text-align:center;color:var(--text-muted)">Ładowanie…</div>
      </div>
    </div>
  </main>
</div>
<script src="js/api.js?v=2"></script>
<script src="js/auth.js?v=3"></script>
<script src="js/navbar.js?v=5"></script>
<script>
var me = Auth.requireAuth(); if (!me) throw 0;
Navbar.render();

var customers = [];

API.get('/customers').then(function(data) {
  customers = data;
  render();
}).catch(function(e) {
  document.getElementById('list').innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-muted)">Błąd: '+e.message+'</div>';
});

function render() {
  var q = (document.getElementById('search').value||'').toLowerCase();
  var rows = customers.filter(function(c) {
    if (!q) return true;
    return (c.fullName+' '+(c.phone||'')+' '+(c.email||'')).toLowerCase().includes(q);
  });
  document.getElementById('subtitle').textContent = rows.length+' klientów';
  if (!rows.length) {
    document.getElementById('list').innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-muted)">Brak klientów</div>';
    return;
  }
  document.getElementById('list').innerHTML = rows.map(customerCard).join('');
}

function customerCard(c) {
  var active  = c.entries.filter(function(e){ return e.status==='W przechowalni'; }).length;
  var total   = c.entries.length;
  var id      = 'c-'+c.id;
  var entries = c.entries.length ? tableHtml(c.entries) : '<div style="padding:.75rem 1rem;color:var(--text-muted);font-size:.875rem">Brak historii</div>';

  var delFooter = total===0
    ? '<div class="customer-actions" style="padding:.75rem 1rem;display:flex;justify-content:flex-end;border-top:1px solid var(--border)">'+
        '<button class="btn btn-sm btn-danger" onclick="deleteCustomer('+c.id+')">Usuń klienta</button></div>'
    : '<div class="customer-actions" style="padding:.6rem 1rem;color:var(--text-muted);font-size:.8rem;border-top:1px solid var(--border)">Aby usunąć klienta, usuń najpierw jego wpisy.</div>';

  return '<div class="customer-card">'+
    '<button class="customer-header" onclick="toggle(\''+id+'\')">'+
      '<div class="customer-info">'+
        '<div class="customer-name">'+c.fullName+'</div>'+
        (c.phone?'<div class="customer-phone text-muted">'+c.phone+'</div>':'')+
        (c.email?'<div class="customer-email text-muted" style="font-size:.8rem">'+c.email+'</div>':'')+
      '</div>'+
      '<div class="customer-meta">'+
        (active?'<span class="status-badge status-badge--green">'+active+' w przechowalni</span>':'')+
        '<span class="text-muted" style="font-size:.82rem">'+total+' wpisów</span>'+
        '<span class="customer-chevron" id="ch-'+c.id+'">+</span>'+
      '</div>'+
    '</button>'+
    '<div class="customer-history" id="'+id+'" style="display:none">'+entries+delFooter+'</div>'+
  '</div>';
}

function tableHtml(entries) {
  return '<div class="table-wrapper"><table class="table" style="font-size:.875rem">'+
    '<thead><tr><th>Rejestracja</th><th>Rozmiar</th><th>Lokalizacja</th><th>Data przyjęcia</th><th>Status</th><th>Data wydania</th></tr></thead>'+
    '<tbody>'+entries.map(function(e){
      var size  = e.tireWidth+'/'+e.tireProfile+'R'+e.tireDiameter;
      var badge = e.status==='W przechowalni'
        ? '<span class="status-badge status-badge--green">W przechowalni</span>'
        : '<span class="status-badge status-badge--gray">Wydane</span>';
      return '<tr>'+
        '<td><span class="plate"><span class="plate-eu"><span class="plate-country">PL</span></span><span class="plate-text">'+e.licensePlate+'</span></span></td>'+
        '<td><span style="font-family:monospace;font-weight:600">'+size+'</span></td>'+
        '<td><span class="location-badge">'+e.location+'</span></td>'+
        '<td>'+e.dateIn+'</td>'+
        '<td>'+badge+'</td>'+
        '<td>'+(e.dateOut||'—')+'</td>'+
      '</tr>';
    }).join('')+'</tbody></table></div>';
}

async function deleteCustomer(id) {
  var c = customers.find(function(x){ return String(x.id)===String(id); });
  if (!confirm('Usunąć klienta „'+(c?c.fullName:'')+'"? Operacja jest nieodwracalna.')) return;
  try {
    await API.del('/customers/'+id);
    customers = customers.filter(function(x){ return String(x.id)!==String(id); });
    render();
  } catch(e) { alert(e.message || 'Nie udało się usunąć klienta.'); }
}
function toggle(id) {
  var el = document.getElementById(id);
  var cid = id.replace('c-','');
  var ch  = document.getElementById('ch-'+cid);
  var open = el.style.display==='none';
  el.style.display  = open?'block':'none';
  if (ch) ch.textContent = open?'−':'+';
}
</script>
</body>
</html>
