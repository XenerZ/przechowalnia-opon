<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opony — Przechowalnia Opon</title>
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
  <link rel="manifest" href="assets/favicon/site.webmanifest"><link rel="stylesheet" href="css/app.css?v=2">
</head>
<body>
<div class="app-layout">
  <div id="navbar-container"></div>
  <main class="app-main">
    <div class="page">
      <div class="page-header">
        <div>
          <h1 class="page-title" id="pageTitle">Przechowalnia opon</h1>
          <p class="page-subtitle" id="subtitle">Ładowanie…</p>
        </div>
        <button class="btn btn-primary" id="addBtn" style="display:none" onclick="openAdd()">+ Dodaj wpis</button>
      </div>

      <div class="toolbar">
        <input class="search-input" id="search" placeholder="Szukaj po nazwisku, rejestracji, rozmiarze..." oninput="render()">
        <div class="filter-group" id="filterGroup">
          <button class="filter-btn filter-btn--active" data-s="Wszystkie" onclick="setStatus(this)">Wszystkie</button>
          <button class="filter-btn" data-s="W przechowalni" onclick="setStatus(this)">W przechowalni</button>
          <button class="filter-btn" data-s="Wydane" onclick="setStatus(this)">Wydane</button>
        </div>
        <button class="btn btn-outline btn-sm" id="dateToggleBtn" onclick="toggleDates()">
          Filtry dat<span class="filters-active-dot" id="dateDot" style="display:none"></span>
        </button>
      </div>

      <div id="dateFilters" class="date-filters" style="display:none">
        <div class="date-filter-group">
          <span class="date-filter-label">Data przyjęcia</span>
          <div class="date-filter-inputs">
            <input type="date" id="dateInFrom" oninput="render()" title="Od">
            <span class="date-filter-sep">—</span>
            <input type="date" id="dateInTo" oninput="render()" title="Do">
          </div>
        </div>
        <div class="date-filter-group">
          <span class="date-filter-label">Data wydania</span>
          <div class="date-filter-inputs">
            <input type="date" id="dateOutFrom" oninput="render()" title="Od">
            <span class="date-filter-sep">—</span>
            <input type="date" id="dateOutTo" oninput="render()" title="Do">
          </div>
        </div>
        <div style="display:flex;align-items:flex-end">
          <button class="btn btn-outline btn-sm" id="clearDatesBtn" style="display:none" onclick="clearDates()">Wyczyść daty</button>
        </div>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table class="table">
            <thead><tr>
              <th class="sortable" data-col="id">ID <span class="sort-icon" id="si-id">↕</span></th>
              <th class="sortable" data-col="fullName">Klient <span class="sort-icon" id="si-fullName">↕</span></th>
              <th>Telefon</th>
              <th class="sortable" data-col="licensePlate">Nr rejestracyjny <span class="sort-icon" id="si-licensePlate">↕</span></th>
              <th>Pojazd</th>
              <th>Rozmiar opon</th>
              <th class="sortable" data-col="location">Lokalizacja <span class="sort-icon" id="si-location">↕</span></th>
              <th class="sortable" data-col="dateIn">Data przyjęcia <span class="sort-icon" id="si-dateIn">↕</span></th>
              <th>Status</th>
              <th class="sortable" data-col="dateOut">Data wydania <span class="sort-icon" id="si-dateOut">↕</span></th>
              <th>Akcje</th>
            </tr></thead>
            <tbody id="tbody"><tr><td colspan="11" class="table-empty">Ładowanie…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal: Podgląd -->
<div class="modal-overlay" id="mPreview" style="display:none" onclick="overlayClose(event,'mPreview')">
  <div class="modal-box" style="max-width:620px">
    <div class="modal-header">
      <span class="modal-title">Podgląd wpisu</span>
      <button class="modal-close" onclick="closeModal('mPreview')">✕</button>
    </div>
    <div class="modal-body" id="previewBody"></div>
  </div>
</div>

<!-- Modal: Dodaj / Edytuj -->
<div class="modal-overlay" id="mEdit" style="display:none" onclick="overlayClose(event,'mEdit')">
  <div class="modal-box" style="max-width:700px">
    <div class="modal-header">
      <span class="modal-title" id="mEditTitle">Nowy wpis</span>
      <button class="modal-close" onclick="closeModal('mEdit')">✕</button>
    </div>
    <div class="modal-body">
      <div id="editErr"></div>
      <form id="tireForm" class="tire-form" onsubmit="saveTire(event)">
        <div class="form-grid">
          <div class="form-group">
            <label>Imię i nazwisko *</label>
            <input id="fName" placeholder="np. Jan Kowalski">
            <span class="form-error" id="errName" style="display:none"></span>
          </div>
          <div class="form-group">
            <label>Telefon</label>
            <input id="fPhone" placeholder="np. 600 100 200">
          </div>
          <div class="form-group">
            <label>E-mail klienta</label>
            <input type="email" id="fEmail" placeholder="np. jan@example.com">
          </div>
          <div class="form-group">
            <label>Nr rejestracyjny *</label>
            <input id="fPlate" placeholder="np. CB 12345" oninput="this.value=this.value.toUpperCase()">
            <span class="form-error" id="errPlate" style="display:none"></span>
          </div>
          <div class="form-group">
            <label>Pojazd <span class="form-hint">marka, model</span></label>
            <input id="fVehicle" placeholder="np. Audi A4">
          </div>
          <div class="form-group">
            <label>Lokalizacja *</label>
            <input id="fLoc" placeholder="np. A-3" oninput="this.value=this.value.toUpperCase()">
            <span class="form-error" id="errLoc" style="display:none"></span>
          </div>
        </div>

        <div class="tire-size-section">
          <div class="tire-size-label">Rozmiar opon</div>
          <div class="tire-size-grid">
            <div class="form-group">
              <label>Szerokość * <span class="form-hint">mm</span></label>
              <input type="number" id="fW" min="100" max="400" placeholder="np. 205" oninput="sizePreview()">
              <span class="form-error" id="errW" style="display:none"></span>
            </div>
            <div class="form-group">
              <label>Profil * <span class="form-hint">%</span></label>
              <input type="number" id="fP" min="20" max="100" placeholder="np. 55" oninput="sizePreview()">
              <span class="form-error" id="errP" style="display:none"></span>
            </div>
            <div class="form-group">
              <label>Średnica koła * <span class="form-hint">cal</span></label>
              <input type="number" id="fD" min="10" max="30" placeholder="np. 16" oninput="sizePreview()">
              <span class="form-error" id="errD" style="display:none"></span>
            </div>
            <div class="form-group">
              <label>Rocznik <span class="form-hint">rok prod.</span></label>
              <input type="number" id="fYear" min="1990" placeholder="np. 2021" oninput="sizePreview()">
            </div>
          </div>
          <div class="tire-size-preview" id="sizePreview" style="display:none"></div>
        </div>

        <div class="form-grid" style="margin-top:.9rem">
          <div class="form-group">
            <label>Status *</label>
            <select id="fStatus" onchange="onStatusChange()">
              <option>W przechowalni</option>
              <option>Wydane</option>
            </select>
          </div>
          <div class="form-group">
            <label>Data przyjęcia *</label>
            <input type="date" id="fDateIn">
            <span class="form-error" id="errDateIn" style="display:none"></span>
          </div>
          <div class="form-group">
            <label>Data wydania <span id="dateOutStar"></span></label>
            <input type="date" id="fDateOut" disabled>
            <span class="form-error" id="errDateOut" style="display:none"></span>
          </div>
          <div class="form-group">
            <label>Przewid. zmiana opon</label>
            <input type="date" id="fNextChange">
          </div>
          <div class="form-group">
            <label>Cena <span class="form-hint">zł</span></label>
            <input type="number" id="fPrice" min="0" step="0.01" placeholder="np. 120">
          </div>
        </div>

        <div class="form-group" style="margin-top:.9rem">
          <label>Uwagi</label>
          <textarea id="fNotes" rows="3" placeholder="Marka opon, typ felg, dodatkowe informacje..."></textarea>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-outline" onclick="closeModal('mEdit')">Anuluj</button>
          <button type="submit" class="btn btn-primary" id="tireSubmitBtn">Dodaj wpis</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Modal: Wydanie -->
<div class="modal-overlay" id="mRelease" style="display:none" onclick="overlayClose(event,'mRelease')">
  <div class="modal-box" style="max-width:440px">
    <div class="modal-header">
      <span class="modal-title">Wydanie opon</span>
      <button class="modal-close" onclick="closeModal('mRelease')">✕</button>
    </div>
    <div class="modal-body">
      <div class="release-info" id="releaseInfo"></div>
      <div class="form-group" style="margin-top:1.25rem">
        <label>Data wydania *</label>
        <input type="date" id="relDateOut">
        <span class="form-error" id="relErr" style="display:none"></span>
      </div>
      <div class="form-actions" style="margin-top:1.5rem">
        <button class="btn btn-outline" onclick="closeModal('mRelease')">Anuluj</button>
        <button class="btn btn-release" id="relBtn" onclick="confirmRelease()">Potwierdź wydanie</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Usuń -->
<div class="modal-overlay" id="mDelete" style="display:none" onclick="overlayClose(event,'mDelete')">
  <div class="modal-box" style="max-width:440px">
    <div class="modal-header">
      <span class="modal-title">Potwierdź usunięcie</span>
      <button class="modal-close" onclick="closeModal('mDelete')">✕</button>
    </div>
    <div class="modal-body">
      <form onsubmit="confirmDelete(event)">
        <div class="confirm-message" id="delMsg"></div>
        <div class="form-group" style="margin-top:1.25rem">
          <label>Potwierdź hasłem</label>
          <input type="password" id="delPass" placeholder="Twoje hasło">
          <span class="form-error" id="delErr" style="display:none"></span>
        </div>
        <div class="form-actions" style="margin-top:1.25rem">
          <button type="button" class="btn btn-outline" onclick="closeModal('mDelete')">Anuluj</button>
          <button type="submit" class="btn btn-danger" id="delBtn">Usuń</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="js/api.js?v=2"></script>
<script src="js/auth.js"></script>
<script src="js/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script src="js/print.js"></script>
<script>
var me = Auth.requireAuth(); if (!me) throw 0;
Navbar.render();

var tires = [], templates = [];
var sortCol = 'id', sortDir = 'asc';
var statusFilter = 'Wszystkie', weekFilter = 'all';
var editId = null, deleteId = null, releaseTarget = null;

if (Auth.can(me, 'add_entries')) document.getElementById('addBtn').style.display = 'inline-flex';

// URL params
(function () {
  var p = new URLSearchParams(location.search);
  var s = p.get('status');
  var w = p.get('week');
  if (s) {
    statusFilter = s;
    document.querySelectorAll('.filter-btn[data-s]').forEach(function (b) {
      b.classList.toggle('filter-btn--active', b.dataset.s === s);
    });
  }
  if (w) {
    weekFilter = w;
    var labels = { releasedThisWeek: 'Wydane w tym tygodniu', receivedThisWeek: 'Przyjęte w tym tygodniu' };
    document.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('filter-btn--active'); });
    var wb = document.createElement('button');
    wb.className = 'filter-btn filter-btn--active';
    wb.textContent = (labels[w] || w) + ' ×';
    wb.onclick = function () { weekFilter = 'all'; wb.remove(); render(); document.getElementById('pageTitle').textContent = 'Przechowalnia opon'; };
    document.getElementById('filterGroup').appendChild(wb);
    document.getElementById('pageTitle').textContent = 'Przechowalnia opon · ' + (labels[w] || '');
  }
})();

document.querySelectorAll('th[data-col]').forEach(function (th) {
  th.addEventListener('click', function () {
    var c = th.dataset.col;
    if (sortCol === c) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    else { sortCol = c; sortDir = 'asc'; }
    render();
  });
});

document.addEventListener('click', function (e) {
  var btn = e.target.closest('button[data-action]');
  if (btn) {
    var id  = +btn.dataset.id;
    var t   = tires.find(function (x) { return x.id === id; });
    var act = btn.dataset.action;
    if (act === 'edit')         { closeModal('mPreview'); openEdit(t); }
    if (act === 'release')      { closeModal('mPreview'); openRelease(t); }
    if (act === 'delete')       { closeModal('mPreview'); openDelete(t); }
    if (act === 'print-toggle') {
      document.querySelectorAll('.print-dropdown__menu').forEach(function (m) { m.style.display = 'none'; });
      var menu = btn.nextElementSibling;
      if (menu) menu.style.display = (menu.style.display === 'none' ? 'block' : 'none');
    }
    if (act === 'print-item') doPrint(id, +btn.dataset.tpl);
    return;
  }
  if (!e.target.closest('.print-dropdown')) {
    document.querySelectorAll('.print-dropdown__menu').forEach(function (m) { m.style.display = 'none'; });
  }
  var row = e.target.closest('tr.row-clickable');
  if (row) {
    var id = +row.dataset.id;
    var t  = tires.find(function (x) { return x.id === id; });
    if (t) openPreview(t);
  }
});

Promise.all([API.get('/tires'), API.get('/templates')]).then(function (r) {
  tires = r[0]; templates = r[1]; render();
  var p = new URLSearchParams(location.search);
  var wpis = p.get('wpis');
  if (wpis) { var t = tires.find(function (x) { return String(x.id) === wpis; }); if (t) openPreview(t); }
  if (p.get('add') === '1' && Auth.can(me, 'add_entries')) openAdd();
}).catch(function (e) {
  document.getElementById('tbody').innerHTML = '<tr><td colspan="11" class="table-empty">Błąd: ' + e.message + '</td></tr>';
});

function getThisWeekRange() {
  var today = new Date(); today.setHours(0,0,0,0);
  var day = today.getDay(), diff = day === 0 ? -6 : 1 - day;
  var start = new Date(today); start.setDate(today.getDate() + diff);
  var end = new Date(start); end.setDate(start.getDate() + 7);
  return [start, end];
}
function parseDateOnly(val) {
  if (!val) return NaN;
  var pts = String(val).slice(0,10).split('-').map(Number);
  return new Date(pts[0], pts[1]-1, pts[2]).getTime();
}

function filtered() {
  var q = (document.getElementById('search').value || '').toLowerCase();
  var dif = document.getElementById('dateInFrom').value,
      dit = document.getElementById('dateInTo').value,
      dof = document.getElementById('dateOutFrom').value,
      dot = document.getElementById('dateOutTo').value;
  var range = getThisWeekRange();

  return tires.filter(function (t) {
    var size = t.tireWidth + '/' + t.tireProfile + ' R' + t.tireDiameter;
    if (q && !(
      (t.fullName||'').toLowerCase().includes(q) ||
      (t.licensePlate||'').toLowerCase().includes(q) ||
      size.toLowerCase().includes(q) ||
      (t.location||'').toLowerCase().includes(q) ||
      (t.phone||'').includes(q)
    )) return false;
    if (statusFilter !== 'Wszystkie' && t.status !== statusFilter) return false;
    if (weekFilter === 'releasedThisWeek') {
      if (!t.dateOut) return false;
      var d = new Date(t.dateOut); if (d < range[0] || d >= range[1]) return false;
    } else if (weekFilter === 'receivedThisWeek') {
      var d = new Date(t.dateIn); if (d < range[0] || d >= range[1]) return false;
    }
    var tIn = parseDateOnly(t.dateIn), tOut = parseDateOnly(t.dateOut);
    if (dif && tIn < parseDateOnly(dif)) return false;
    if (dit && tIn > parseDateOnly(dit)) return false;
    if (dof && (!t.dateOut || tOut < parseDateOnly(dof))) return false;
    if (dot && (!t.dateOut || tOut > parseDateOnly(dot))) return false;
    return true;
  }).sort(function (a, b) {
    var av = a[sortCol] != null ? a[sortCol] : '', bv = b[sortCol] != null ? b[sortCol] : '';
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    return sortDir === 'asc' ? (av < bv ? -1 : av > bv ? 1 : 0) : (bv < av ? -1 : bv > av ? 1 : 0);
  });
}

function render() {
  var rows = filtered();
  document.getElementById('subtitle').textContent = rows.length + ' z ' + tires.length + ' wpisów';
  ['id','fullName','licensePlate','location','dateIn','dateOut'].forEach(function (c) {
    var el = document.getElementById('si-' + c); if (!el) return;
    el.textContent = sortCol === c ? (sortDir === 'asc' ? '↑' : '↓') : '↕';
    el.className = 'sort-icon' + (sortCol === c ? ' active' : '');
  });
  var hasDates = document.getElementById('dateInFrom').value || document.getElementById('dateInTo').value ||
                 document.getElementById('dateOutFrom').value || document.getElementById('dateOutTo').value;
  document.getElementById('dateDot').style.display = hasDates ? 'inline-block' : 'none';
  document.getElementById('clearDatesBtn').style.display = hasDates ? '' : 'none';

  if (!rows.length) { document.getElementById('tbody').innerHTML = '<tr><td colspan="11" class="table-empty">Brak wyników</td></tr>'; return; }

  document.getElementById('tbody').innerHTML = rows.map(function (t) {
    var size  = Print.formatTireSize(t.tireWidth, t.tireProfile, t.tireDiameter, t.tireYear);
    var badge = t.status === 'W przechowalni'
      ? '<span class="status-badge status-badge--green">W przechowalni</span>'
      : '<span class="status-badge status-badge--gray">Wydane</span>';
    var plate = '<span class="plate"><span class="plate-eu"><span class="plate-country">PL</span></span><span class="plate-text">' + t.licensePlate + '</span></span>';

    var btns = '<div class="action-btns">';
    if (templates.length) {
      btns += '<div class="print-dropdown"><button class="btn btn-sm btn-outline btn-print" data-action="print-toggle" data-id="' + t.id + '" title="Drukuj">Drukuj</button>' +
        '<div class="print-dropdown__menu" style="display:none"><div class="print-dropdown__header">Wybierz szablon</div>' +
        templates.map(function (tpl) { return '<button class="print-dropdown__item" data-action="print-item" data-id="' + t.id + '" data-tpl="' + tpl.id + '">' + tpl.name + '</button>'; }).join('') +
        '</div></div>';
    }
    if (Auth.can(me,'edit_entries') && t.status === 'W przechowalni')
      btns += '<button class="btn btn-sm btn-release" data-action="release" data-id="' + t.id + '">Wydaj</button>';
    if (Auth.can(me,'edit_entries'))
      btns += '<button class="btn btn-sm btn-outline" data-action="edit" data-id="' + t.id + '">Edytuj</button>';
    if (Auth.can(me,'delete_entries'))
      btns += '<button class="btn btn-sm btn-danger" data-action="delete" data-id="' + t.id + '">Usuń</button>';
    if (!Auth.can(me,'edit_entries') && !Auth.can(me,'delete_entries'))
      btns += '<span class="text-muted" style="font-size:.8rem">Tylko odczyt</span>';
    btns += '</div>';

    return '<tr class="row-clickable" data-id="' + t.id + '">' +
      '<td class="text-muted">' + t.id + '</td>' +
      '<td><strong>' + t.fullName + '</strong></td>' +
      '<td>' + (t.phone || '—') + '</td>' +
      '<td>' + plate + '</td>' +
      '<td>' + (t.vehicle || '—') + '</td>' +
      '<td>' + size + '</td>' +
      '<td><span class="location-badge">' + t.location + '</span></td>' +
      '<td>' + t.dateIn + '</td>' +
      '<td>' + badge + '</td>' +
      '<td>' + (t.dateOut || '—') + '</td>' +
      '<td>' + btns + '</td>' +
      '</tr>';
  }).join('');
}

function setStatus(btn) {
  statusFilter = btn.dataset.s; weekFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('filter-btn--active'); });
  btn.classList.add('filter-btn--active');
  document.getElementById('pageTitle').textContent = 'Przechowalnia opon';
  render();
}
function toggleDates() {
  var el = document.getElementById('dateFilters');
  el.style.display = el.style.display === 'none' ? 'grid' : 'none';
}
function clearDates() {
  ['dateInFrom','dateInTo','dateOutFrom','dateOutTo'].forEach(function (id) { document.getElementById(id).value = ''; });
  render();
}

function openPreview(t) {
  var size = Print.formatTireSize(t.tireWidth, t.tireProfile, t.tireDiameter, t.tireYear);
  var badge = t.status === 'W przechowalni'
    ? '<span class="status-badge status-badge--green">W przechowalni</span>'
    : '<span class="status-badge status-badge--gray">Wydane</span>';
  document.getElementById('previewBody').innerHTML =
    '<div class="preview-grid">' +
    prow('Klient', '<strong>' + t.fullName + '</strong>') + prow('Telefon', t.phone || '—') +
    prow('Nr rejestracyjny', '<span class="plate"><span class="plate-eu"><span class="plate-country">PL</span></span><span class="plate-text">' + t.licensePlate + '</span></span>') +
    prow('Pojazd', t.vehicle || '—') + prow('Cena', fmtPrice(t.price)) +
    prow('Rozmiar opon', size) + prow('Lokalizacja', '<span class="location-badge">' + t.location + '</span>') +
    prow('Status', badge) + prow('Data przyjęcia', t.dateIn) + prow('Data wydania', t.dateOut || '—') +
    (t.notes ? '<div class="preview-notes" style="grid-column:1/-1">' + t.notes + '</div>' : '') +
    '</div>' +
    '<div class="form-actions" style="margin-top:1.5rem">' +
      '<button class="btn btn-outline" onclick="closeModal(\'mPreview\')">Zamknij</button>' +
      '<div style="display:flex;gap:.5rem">' +
        (Auth.can(me,'edit_entries') && t.status==='W przechowalni' ? '<button class="btn btn-release" data-action="release" data-id="'+t.id+'">Wydaj</button>' : '') +
        (Auth.can(me,'edit_entries') ? '<button class="btn btn-primary" data-action="edit" data-id="'+t.id+'">Edytuj</button>' : '') +
        (Auth.can(me,'delete_entries') ? '<button class="btn btn-danger" data-action="delete" data-id="'+t.id+'">Usuń</button>' : '') +
      '</div>' +
    '</div>';
  openModal('mPreview');
}
function prow(l, v) { return '<div class="preview-row"><span class="preview-label">'+l+'</span><span class="preview-value">'+(v||'—')+'</span></div>'; }
function fmtPrice(p) { return (p != null && p !== '') ? (Number(p).toFixed(2).replace('.', ',') + ' zł') : '—'; }

function openAdd() {
  editId = null;
  document.getElementById('mEditTitle').textContent = 'Nowy wpis';
  document.getElementById('tireSubmitBtn').textContent = 'Dodaj wpis';
  ['fName','fPhone','fEmail','fPlate','fVehicle','fLoc','fPrice','fNotes'].forEach(function(id){ document.getElementById(id).value=''; });
  ['fW','fP','fD','fYear'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('fNextChange').value = '';
  document.getElementById('fDateIn').value = new Date().toISOString().slice(0,10);
  document.getElementById('fDateOut').value = ''; document.getElementById('fDateOut').disabled = true;
  document.getElementById('fStatus').value = 'W przechowalni';
  document.getElementById('dateOutStar').textContent = '';
  document.getElementById('sizePreview').style.display = 'none';
  document.getElementById('editErr').innerHTML = '';
  clearErrors(); openModal('mEdit');
}
function openEdit(t) {
  editId = t.id;
  document.getElementById('mEditTitle').textContent = 'Edytuj wpis';
  document.getElementById('tireSubmitBtn').textContent = 'Zapisz zmiany';
  document.getElementById('fName').value       = t.fullName || '';
  document.getElementById('fPhone').value      = t.phone || '';
  document.getElementById('fEmail').value      = t.email || '';
  document.getElementById('fPlate').value      = t.licensePlate || '';
  document.getElementById('fVehicle').value    = t.vehicle || '';
  document.getElementById('fPrice').value      = (t.price != null ? t.price : '');
  document.getElementById('fLoc').value     = t.location || '';
  document.getElementById('fW').value       = t.tireWidth || '';
  document.getElementById('fP').value       = t.tireProfile || '';
  document.getElementById('fD').value       = t.tireDiameter || '';
  document.getElementById('fYear').value    = t.tireYear || '';
  document.getElementById('fDateIn').value     = t.dateIn || '';
  document.getElementById('fStatus').value     = t.status || 'W przechowalni';
  document.getElementById('fDateOut').value    = t.dateOut || '';
  document.getElementById('fNextChange').value = t.nextTireChange || '';
  document.getElementById('fDateOut').disabled = (t.status !== 'Wydane');
  document.getElementById('dateOutStar').textContent = t.status === 'Wydane' ? '*' : '';
  document.getElementById('fNotes').value   = t.notes || '';
  document.getElementById('editErr').innerHTML = '';
  clearErrors(); sizePreview(); openModal('mEdit');
}
function clearErrors() {
  ['Name','Plate','Loc','W','P','D','DateIn','DateOut'].forEach(function(s){
    var el = document.getElementById('err'+s); if(el){el.style.display='none';el.textContent='';}
  });
}
function showErr(id, msg) { var el=document.getElementById(id); el.textContent=msg; el.style.display='block'; }
function onStatusChange() {
  var s = document.getElementById('fStatus').value;
  document.getElementById('fDateOut').disabled = (s !== 'Wydane');
  document.getElementById('dateOutStar').textContent = s === 'Wydane' ? '*' : '';
  if (s !== 'Wydane') document.getElementById('fDateOut').value = '';
}
function sizePreview() {
  var w=document.getElementById('fW').value, p=document.getElementById('fP').value,
      d=document.getElementById('fD').value, y=document.getElementById('fYear').value;
  var prev = document.getElementById('sizePreview');
  if (w||p||d) { prev.textContent=(w||'–')+'/'+(p||'–')+' R'+(d||'–')+(y?' · '+y:''); prev.style.display=''; }
  else prev.style.display='none';
}
async function saveTire(e) {
  e.preventDefault(); clearErrors();
  var name=document.getElementById('fName').value.trim(), plate=document.getElementById('fPlate').value.trim(),
      loc=document.getElementById('fLoc').value.trim(), w=document.getElementById('fW').value,
      p=document.getElementById('fP').value, d=document.getElementById('fD').value,
      dateIn=document.getElementById('fDateIn').value, status=document.getElementById('fStatus').value,
      dateOut=document.getElementById('fDateOut').value;
  var ok=true;
  if(!name){showErr('errName','Pole wymagane');ok=false;}
  if(!plate){showErr('errPlate','Pole wymagane');ok=false;}
  if(!loc){showErr('errLoc','Pole wymagane');ok=false;}
  if(!w){showErr('errW','Pole wymagane');ok=false;}
  if(!p){showErr('errP','Pole wymagane');ok=false;}
  if(!d){showErr('errD','Pole wymagane');ok=false;}
  if(!dateIn){showErr('errDateIn','Pole wymagane');ok=false;}
  if(status==='Wydane'&&!dateOut){showErr('errDateOut','Podaj datę wydania');ok=false;}
  if(!ok)return;
  var btn=document.getElementById('tireSubmitBtn');
  btn.disabled=true; btn.textContent='Zapisywanie…';
  try {
    var data={fullName:name,phone:document.getElementById('fPhone').value.trim(),
      email:document.getElementById('fEmail').value.trim()||null,
      licensePlate:plate,
      vehicle:document.getElementById('fVehicle').value.trim()||null,
      price:document.getElementById('fPrice').value!==''?+document.getElementById('fPrice').value:null,
      location:loc,tireWidth:+w,tireProfile:+p,tireDiameter:+d,
      tireYear:document.getElementById('fYear').value?+document.getElementById('fYear').value:null,
      dateIn:dateIn,status:status,dateOut:dateOut||null,
      nextTireChange:document.getElementById('fNextChange').value||null,
      notes:document.getElementById('fNotes').value.trim()||null};
    var res;
    if(editId){res=await API.put('/tires/'+editId,data);var i=tires.findIndex(function(t){return t.id===editId;});if(i!==-1)tires[i]=res;}
    else{res=await API.post('/tires',data);tires.push(res);}
    closeModal('mEdit'); render();
  } catch(err){ document.getElementById('editErr').innerHTML='<div class="alert alert-error">'+err.message+'</div>'; }
  finally{ btn.disabled=false; btn.textContent=editId?'Zapisz zmiany':'Dodaj wpis'; }
}

function openRelease(t) {
  releaseTarget = t;
  document.getElementById('releaseInfo').innerHTML =
    rrow('Klient',t.fullName)+
    rrow('Nr rejestracyjny','<span class="plate"><span class="plate-eu"><span class="plate-country">PL</span></span><span class="plate-text">'+t.licensePlate+'</span></span>')+
    rrow('Rozmiar opon',Print.formatTireSize(t.tireWidth,t.tireProfile,t.tireDiameter,t.tireYear))+
    rrow('Lokalizacja','<span class="location-badge">'+t.location+'</span>')+
    rrow('W przechowalni od',t.dateIn);
  document.getElementById('relDateOut').value = new Date().toISOString().slice(0,10);
  document.getElementById('relErr').style.display = 'none';
  openModal('mRelease');
}
function rrow(l,v){return '<div class="release-row"><span class="release-label">'+l+'</span><span>'+v+'</span></div>';}
async function confirmRelease() {
  var dateOut=document.getElementById('relDateOut').value, errEl=document.getElementById('relErr');
  if(!dateOut){errEl.textContent='Podaj datę wydania.';errEl.style.display='block';return;}
  if(releaseTarget&&dateOut<releaseTarget.dateIn){errEl.textContent='Data wydania nie może być wcześniejsza niż data przyjęcia.';errEl.style.display='block';return;}
  var btn=document.getElementById('relBtn'); btn.disabled=true; btn.textContent='Zapisywanie…';
  try{
    var res=await API.put('/tires/'+releaseTarget.id,{status:'Wydane',dateOut:dateOut});
    var i=tires.findIndex(function(t){return t.id===releaseTarget.id;}); if(i!==-1)tires[i]=res;
    closeModal('mRelease'); render();
  }catch(e){errEl.textContent=e.message;errEl.style.display='block';}
  finally{btn.disabled=false;btn.textContent='Potwierdź wydanie';}
}

function openDelete(t) {
  deleteId=t.id;
  document.getElementById('delMsg').innerHTML='Czy na pewno chcesz usunąć wpis klienta <strong>'+t.fullName+'</strong> ('+t.licensePlate+')? <span style="color:var(--danger)">Operacja jest nieodwracalna.</span>';
  document.getElementById('delPass').value=''; document.getElementById('delErr').style.display='none';
  openModal('mDelete');
}
async function confirmDelete(e) {
  e.preventDefault();
  var pass=document.getElementById('delPass').value, errEl=document.getElementById('delErr');
  if(!pass){errEl.textContent='Podaj hasło.';errEl.style.display='block';return;}
  var btn=document.getElementById('delBtn'); btn.disabled=true; btn.textContent='Weryfikacja…';
  try{
    var v=await API.post('/auth/verify-password',{password:pass});
    if(!v.valid){errEl.textContent='Nieprawidłowe hasło.';errEl.style.display='block';document.getElementById('delPass').value='';btn.disabled=false;btn.textContent='Usuń';return;}
    await API.del('/tires/'+deleteId);
    tires=tires.filter(function(t){return t.id!==deleteId;});
    closeModal('mDelete'); render();
  }catch(err){errEl.textContent=err.message;errEl.style.display='block';btn.disabled=false;btn.textContent='Usuń';}
}

async function doPrint(tireId, tplId) {
  try{var t=tires.find(function(x){return x.id===tireId;});var tpl=await API.get('/templates/'+tplId);await Print.printTire(tpl.htmlContent,t,tpl.pageSize);}
  catch(e){alert('Błąd drukowania: '+e.message);}
}

function openModal(id){document.getElementById(id).style.display='flex';}
function closeModal(id){document.getElementById(id).style.display='none';}
function overlayClose(e,id){if(e.target===document.getElementById(id))closeModal(id);}
</script>
</body>
</html>
